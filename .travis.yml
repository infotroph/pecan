# Follow instructions on:
# https://blog.rstudio.org/2016/03/09/r-on-travis-ci/

# A few blocks in here can be removed when Travis updates its Ubuntu image past 
# trusty. They are marked with TRUSTY for easy grepping.

language: r
r:
  - 3.4

# TRUSTY: Change version when 16.04 image is available.
dist: trusty
sudo: required

env:
  global:
    # TODO: `make -j2` interleaves output lines from simultaneous processes.
    # Would be nice to fix by adding `-Otarget`, but not supported in Make 3.x.
    # When Travis updates, check for Make 4 and add -O if available.
    - MAKEFLAGS="-j2"
    - PGHOST=localhost

cache: 
  - directories:
    - .install
    - .check
    - .test
    - .doc
  - packages

addons:
  apt:
    sources:
      - sourceline: 'ppa:nschloe/hdf5-backports'
      - sourceline: 'ppa:ubuntugis/ppa' # for GDAL 2 binaries
    packages:
      - bc
      - curl
      - gdal-bin
      - jags
      - libcurl4-openssl-dev
      - libgdal-dev
      - libgmp-dev
      - libhdf5-dev
      - liblapack-dev
      - libnetcdf-dev
      - libproj-dev
      - libudunits2-dev
      - netcdf-bin
      - pandoc
      - python-dev
      - tcl
      - tcl-dev
      - udunits-bin
      # R package binaries from c2d4u
      - r-bioc-biocinstaller
      - r-cran-ape
      - r-cran-curl
      - r-cran-devtools
      - r-cran-dplyr
      - r-cran-ggplot2
      - r-cran-httr
      - r-cran-igraph
      - r-cran-lme4
      - r-cran-matrixstats
      - r-cran-mcmcpack
      - r-cran-raster
      - r-cran-rcpp
      - r-cran-rcurl
      - r-cran-redland
      - r-cran-rncl
      - r-cran-roxygen2
      - r-cran-shiny
      - r-cran-testthat
      - r-cran-tidyverse
      - r-cran-xml
      - r-cran-xml2

  
## notifications should go to gitter
notifications:
  slack:
    # Slack token created by Chris Black, 2018-02-17
    secure: "DHHSNmiCf71SLa/FFSqx9oOnJjJt2GHYk7NsFIBb9ZY10RvQtIPfaoNxkPjqu9HLyZWJSFtg/uNKKplEHc6W80NoXyqoTvwOxTPjMaViXaCNqsmzjjR/JaCWT/oWGXyAw0VX3S8cwuIexlKQGgZwJpIzoVOZqUrDrHI/O17kZoM="
  email:
    on_success: always
    on_failure: always

## list of services to be running
services:
  - docker

install: skip

stages:
  - setup
  - test
  # - integration
  # - deploy

jobs:
  include:
    - stage: setup
      script: skip
      install:
        - set -e
        - pushd $HOME
        - curl -o sipnet_unk.tar.gz http://isda.ncsa.illinois.edu/~kooper/EBI/sipnet_unk.tar.gz
        - tar zxf sipnet_unk.tar.gz
        - cd sipnet_unk
        - make
        - popd
        - sudo service postgresql stop
        - docker run --detach --rm --name postgresql --publish 5432:5432 mdillon/postgis:9.6-alpine
        - echo -n "Waiting for Postgres to start...";
          until psql -U postgres -c 'select 1' >/dev/null 2>&1;
            do echo -n ".";
            sleep 1;
          done;
          echo " OK"
        - psql -q -o /dev/null -U postgres -c "CREATE ROLE BETY WITH LOGIN CREATEDB SUPERUSER CREATEROLE UNENCRYPTED PASSWORD 'bety'";
        - psql -q -o /dev/null -U postgres -c "CREATE DATABASE bety OWNER bety;"
        - curl -o bety.sql http://isda.ncsa.illinois.edu/~kooper/PEcAn/data/bety.sql
        - psql -q -o /dev/null -U postgres < bety.sql
        - rm bety.sql
        - ./scripts/add.models.sh
        - chmod +x book_source/deploy.sh
        - chmod +x documentation/tutorials/deploy.sh
        - echo 'Installing PEcAn packages'
        # - make document
        # TODO: Would probably be faster to use -j2 NCPUS=1 as for other steps,
        # but many dependency compilations seem not parallel-safe.
        # More debugging needed.
        - NCPUS=2 make -j1 .install/"$TEST_PKG"
        # TODO this ought to run after tests too, to ensure they clean up correctly
        # Maybe as a before_cache step?
        - if [[ `git status -s` ]]; then
            echo "These files were changed by the build process:";
            git status -s;
            echo "Have you run devtools::check and commited any updated Roxygen outputs?";
            exit 1;
          fi
        - set +e
    - stage: test
      script: make .check/base/all
    - script: make .check/base/db
    - script: make .check/base/logger
    - script: make .check/base/qaqc
    - script: make .check/base/remote
    - script: make .check/base/settings
    - script: make .check/base/utils
    - script: make .check/base/visualization
    - script: make .check/base/workflow
    - script: make .check/models/biocro
    - script: make .check/models/clm45
    - script: make .check/models/dalec
    - script: make .check/models/ed
    - script: make .check/models/fates
    - script: make .check/models/gday
    - script: make .check/models/jules
    - script: make .check/models/linkages
    - script: make .check/models/lpjguess
    - script: make .check/models/maat
    - script: make .check/models/maespa
    - script: make .check/models/preles
    - script: make .check/models/sipnet
    - script: make .check/models/template
    - script: make .check/modules/allometry
    - script: make .check/modules/assim.batch
    - script: make .check/modules/assim.sequential
    - script: make .check/modules/benchmark
    - script: make .check/modules/data.atmosphere
    - script: make .check/modules/data.hydrology
    - script: make .check/modules/data.land
    - script: make .check/modules/data.mining
    - script: make .check/modules/data.remote
    - script: make .check/modules/emulator
    - script: make .check/modules/meta.analysis
    - script: make .check/modules/photosynthesis
    - script: make .check/modules/priors
    - script: make .check/modules/rtm
    - script: make .check/modules/uncertainty

